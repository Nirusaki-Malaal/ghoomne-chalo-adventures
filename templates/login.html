<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Ghoomne Chalo | Admin Secure Login</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Secure administrative gateway for Ghoomne Chalo operators. Unauthorized access is strictly logged and prohibited.">
  <meta name="format-detection" content="telephone=no">
  <meta name="color-scheme" content="dark light">

  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/statics/assets/logo.png">
  <meta property="og:title" content="Admin Security Gateway | Ghoomne Chalo">
  <meta property="og:description" content="Secure administrative gateway. Unauthorized access is strictly prohibited.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://ghoomnechalo.com/statics/images/secure-card.jpg">
  <meta property="og:site_name" content="Ghoomne Chalo Adventures">
  <meta name="twitter:card" content="summary_large_image">

  <script src="/statics/js/theme.js"></script>
  <link rel="stylesheet" href="/statics/css/fonts.css">
  <link rel="stylesheet" href="/statics/css/style.css">
  <link rel="stylesheet" href="/statics/css/admin.css">
  <link rel="stylesheet" href="/statics/css/hardening.css">
</head>
<body>
  <div class="login-container">
    <div class="glass-panel login-card">
      <div class="login-logo">
        <span class="brand-line">GHOOMNE CHALO</span><br>
        <span class="brand-subline">ADMIN SECURE LOGIN</span>
      </div>

      {% if error %}
      <div class="error-msg">
        {{ error }}
      </div>
      {% endif %}

      <form action="/login" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="admin-form-group">
          <label class="admin-label" for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter admin username">
        </div>

        <div class="admin-form-group admin-form-group--spacious">
          <label class="admin-label" for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="password-input" name="password" required autocomplete="current-password" placeholder="Enter admin password">
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility" aria-pressed="false">
              <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eye-closed" class="is-hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="admin-btn login-submit">Authenticate</button>
      </form>
    </div>
  </div>

  <script src="/statics/js/login.js"></script>
</body>
</html>
